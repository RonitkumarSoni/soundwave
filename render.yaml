databases:
  - name: soundwave-db
    databaseName: soundwave
    user: soundwave_user
    plan: free

services:
  - type: web
    name: soundwave-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JAMENDO_CLIENT_ID
        value: bc277c86
      - key: DATABASE_URL
        fromDatabase:
          name: soundwave-db
          property: connectionString
